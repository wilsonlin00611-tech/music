<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子為的歌曲</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================= 動漫風格與配色 ================= */
        :root {
            --main-blue: #70a1ff;      /* 晴空藍 */
            --anime-green: #7bed9f;    /* 鮮亮嫩綠 */
            --soft-white: rgba(255, 255, 255, 0.85); 
            --accent-pink: #ff7f50;    /* 夕陽橘紅 */
            --text-dark: #2f3542;
        }

        body {
            font-family: 'Kosugi Maru', sans-serif;
            /* 動漫感漸層背景：模擬晴空與草原 */
            background: linear-gradient(135deg, #e0f7fa 0%, #ffecb3 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 漂浮裝飾小圓點 */
        body::before, body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
            animation: float 10s infinite alternate ease-in-out;
        }
        body::before { width: 300px; height: 300px; background: var(--main-blue); top: -50px; left: -50px; opacity: 0.3; }
        body::after { width: 250px; height: 250px; background: var(--anime-green); bottom: -50px; right: -50px; opacity: 0.3; }

        @keyframes float { 
            0% { transform: translateY(0) scale(1); } 
            100% { transform: translateY(30px) scale(1.1); } 
        }

        /* 播放器主體：玻璃擬態 */
        .player-card {
            background: var(--soft-white);
            backdrop-filter: blur(15px);
            width: 360px;
            border-radius: 40px;
            border: 4px solid white;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        /* 裝飾：小葉子 */
        .deco-icon {
            position: absolute;
            top: -10px;
            right: 20px;
            font-size: 24px;
            color: var(--anime-green);
            transform: rotate(15deg);
        }

        /* 標題與副標 */
        .header h1 {
            font-size: 32px;
            color: var(--main-blue);
            margin: 0;
            text-shadow: 2px 2px 0px white;
        }
        .header p {
            font-size: 14px;
            color: var(--text-dark);
            margin: 5px 0 15px 0;
            letter-spacing: 3px;
            font-weight: bold;
        }

        /* 動態圖示區域 */
        .art-box {
            width: 140px;
            height: 140px;
            margin: 0 auto 15px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            color: var(--main-blue);
            box-shadow: 0 10px 20px rgba(112, 161, 255, 0.2);
            border: 6px solid #f1f2f6;
            animation: pulse 4s infinite ease-in-out;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .current-track {
            font-size: 20px;
            color: var(--text-dark);
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* 搜尋框：動漫清新風 */
        .search-container {
            position: relative;
            margin-bottom: 15px;
        }
        .search-container input {
            width: 100%;
            padding: 10px 10px 10px 35px;
            border-radius: 15px;
            border: 2px solid #dfe4ea;
            outline: none;
            box-sizing: border-box;
            background: rgba(255,255,255,0.5);
            transition: 0.3s;
        }
        .search-container input:focus { border-color: var(--main-blue); background: white; }
        .search-container i { position: absolute; left: 12px; top: 12px; color: #a4b0be; }

        /* 進度條：天空藍 */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 10px;
            background: #dfe4ea;
            outline: none;
            margin-bottom: 20px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            background: white;
            border: 4px solid var(--main-blue);
            border-radius: 50%;
            cursor: pointer;
        }
        #progressBar {
            background: linear-gradient(to right, var(--main-blue) 0%, #dfe4ea 0%);
        }

        /* 按鈕區 */
        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--main-blue);
            font-size: 26px;
            transition: 0.3s;
        }
        .btn:hover { color: var(--accent-pink); transform: scale(1.2); }
        .btn-play { font-size: 50px; }

        /* 音量 */
        .volume-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 10px;
            margin-bottom: 15px;
        }
        .volume-box i { color: var(--main-blue); }

        /* 播放清單 */
        .playlist {
            max-height: 150px;
            overflow-y: auto;
            border-top: 2px solid #f1f2f6;
            padding-top: 10px;
        }
        .playlist::-webkit-scrollbar { width: 4px; }
        .playlist::-webkit-scrollbar-thumb { background: var(--main-blue); border-radius: 10px; }
        
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 4px;
            font-size: 16px;
            color: var(--text-dark);
            text-align: left;
            transition: 0.2s;
        }
        li:hover { background: rgba(112, 161, 255, 0.1); }
        li.active {
            background: var(--anime-green);
            color: white;
            font-weight: bold;
        }
        li.active::before {
            content: "\f06c"; font-family: "Font Awesome 6 Free"; font-weight: 900; margin-right: 10px;
        }
    </style>
</head>
<body>

    <div class="player-card">
        <i class="fas fa-leaf deco-icon"></i>
        <div class="header">
            <h1>子為</h1>
            <p>MP3 PLAYER</p>
        </div>

        <div class="art-box" id="artBox">
            <i class="fas fa-sun"></i>
        </div>

        <div class="current-track" id="trackTitle">Track 01</div>

        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜尋編號或路徑...">
        </div>

        <input type="range" id="progressBar" value="0" min="0" max="100" step="0.1">

        <div class="controls">
            <button class="btn" id="shuffleBtn" title="隨機模式"><i class="fas fa-random"></i></button>
            <button class="btn" id="prevBtn"><i class="fas fa-backward"></i></button>
            <button class="btn btn-play" id="playBtn"><i class="fas fa-play-circle"></i></button>
            <button class="btn" id="nextBtn"><i class="fas fa-forward"></i></button>
            <button class="btn" id="repeatBtn" title="循環模式"><i class="fas fa-redo" id="repeatIcon"></i></button>
        </div>

        <div class="volume-box">
            <i class="fas fa-volume-down"></i>
            <input type="range" id="volumeBar" value="80" min="0" max="100">
            <i class="fas fa-volume-up"></i>
        </div>

        <div class="playlist">
            <ul id="playlistItems"></ul>
        </div>
    </div>

    <audio id="mainAudio"></audio>

    <script>
        // 音樂路徑設定
        const musicFiles = [
            'music/song1.mp3',
            'music/song2.mp3',
            'music/song3.mp3',
            'music/song4.mp3',
            'music/song5.mp3'
        ];

        const icons = ['fa-cloud', 'fa-sun', 'fa-moon', 'fa-seedling', 'fa-leaf', 'fa-mountain', 'fa-water', 'fa-star'];
        const audio = document.getElementById('mainAudio');
        const playlistEl = document.getElementById('playlistItems');
        const trackTitle = document.getElementById('trackTitle');
        const artBox = document.getElementById('artBox');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const volumeBar = document.getElementById('volumeBar');
        const searchInput = document.getElementById('searchInput');

        let currentIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 0; // 0:不, 1:全, 2:單

        function init() {
            renderPlaylist();
            loadTrack(0, false);
        }

        function renderPlaylist() {
            playlistEl.innerHTML = '';
            musicFiles.forEach((file, index) => {
                const li = document.createElement('li');
                const num = String(index + 1).padStart(2, '0');
                li.textContent = num;
                li.dataset.index = index;
                li.dataset.path = file.toLowerCase();
                li.onclick = () => loadTrack(index, true);
                playlistEl.appendChild(li);
            });
        }

        function loadTrack(index, autoPlay) {
            currentIndex = index;
            audio.src = musicFiles[index];
            trackTitle.textContent = `Track ${String(index + 1).padStart(2, '0')}`;
            
            // 隨機更換動漫大自然圖示
            artBox.innerHTML = `<i class="fas ${icons[Math.floor(Math.random()*icons.length)]}"></i>`;
            
            // 更新高亮
            const items = playlistEl.querySelectorAll('li');
            items.forEach(li => li.classList.remove('active'));
            if(items[index]) items[index].classList.add('active');

            if(autoPlay) playMusic();
        }

        function playMusic() { isPlaying = true; audio.play(); playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>'; }
        function pauseMusic() { isPlaying = false; audio.pause(); playBtn.innerHTML = '<i class="fas fa-play-circle"></i>'; }

        playBtn.onclick = () => isPlaying ? pauseMusic() : playMusic();

        document.getElementById('nextBtn').onclick = () => {
            let next = isShuffle ? Math.floor(Math.random()*musicFiles.length) : (currentIndex + 1) % musicFiles.length;
            loadTrack(next, true);
        };

        document.getElementById('prevBtn').onclick = () => {
            let prev = (currentIndex - 1 + musicFiles.length) % musicFiles.length;
            loadTrack(prev, true);
        };

        audio.onended = () => {
            if(repeatMode === 2) loadTrack(currentIndex, true);
            else if(repeatMode === 1 || currentIndex < musicFiles.length - 1 || isShuffle) document.getElementById('nextBtn').click();
            else pauseMusic();
        };

        audio.ontimeupdate = () => {
            if(audio.duration){
                const per = (audio.currentTime / audio.duration) * 100;
                progressBar.value = per;
                progressBar.style.background = `linear-gradient(to right, var(--main-blue) ${per}%, #dfe4ea ${per}%)`;
            }
        };

        progressBar.oninput = () => audio.currentTime = (progressBar.value / 100) * audio.duration;
        volumeBar.oninput = () => audio.volume = volumeBar.value / 100;

        searchInput.oninput = (e) => {
            const val = e.target.value.toLowerCase();
            playlistEl.querySelectorAll('li').forEach(li => {
                li.style.display = (li.textContent.includes(val) || li.dataset.path.includes(val)) ? 'flex' : 'none';
            });
        };

        document.getElementById('shuffleBtn').onclick = () => {
            isShuffle = !isShuffle;
            document.getElementById('shuffleBtn').style.color = isShuffle ? 'var(--accent-pink)' : 'var(--main-blue)';
        };

        document.getElementById('repeatBtn').onclick = () => {
            repeatMode = (repeatMode + 1) % 3;
            const icon = document.getElementById('repeatIcon');
            const btn = document.getElementById('repeatBtn');
            if(repeatMode === 0) { icon.className = 'fas fa-arrow-right'; btn.style.color = 'var(--main-blue)'; }
            else if(repeatMode === 1) { icon.className = 'fas fa-redo'; btn.style.color = 'var(--accent-pink)'; }
            else { icon.className = 'fas fa-sync-alt'; btn.style.color = 'var(--accent-pink)'; }
        };

        init();
    </script>
</body>
</html>
