<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>傑克的歌曲</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================= 視覺風格 (UI/UX) ================= */
        :root {
            --bg-color: #F5EFE6;      /* 溫暖米色背景 */
            --wood-brown: #8B5A2B;    /* 木質棕 */
            --forest-green: #2E8B57;  /* 森林深綠 */
            --sky-blue: #87CEEB;      /* 天空藍進度條 */
            --light-green: #E8F5E9;   /* 高亮淺綠色 */
            --text-color: #3E2723; 
        }

        body {
            font-family: 'Kosugi Maru', sans-serif;
            background-color: var(--bg-color);
            /* 輕微的紙張紋理感 */
            background-image: url('data:image/svg+xml,%3Csvg width="20" height="20" xmlns="http://www.w3.org/2000/svg"%3E%3Ccircle cx="2" cy="2" r="1" fill="%23d7ccc8" opacity="0.3"/%3E%3C/svg%3E');
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        /* 木質窗框播放器主體 */
        .player-window {
            background-color: #FAFAFA;
            width: 380px;
            border: 12px solid var(--wood-brown);
            border-radius: 45px; /* 非常圓潤的邊角 */
            padding: 30px;
            box-shadow: 0 20px 40px rgba(139, 69, 19, 0.3); /* 柔和棕色陰影 */
            box-sizing: border-box;
            position: relative;
        }

        /* 裝飾小葉子 */
        .deco-leaf {
            position: absolute;
            top: -20px;
            right: 30px;
            font-size: 30px;
            color: var(--forest-green);
            transform: rotate(20deg);
        }

        /* 標題區 */
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        .header h1 {
            margin: 0;
            font-size: 32px;
            color: var(--forest-green);
            letter-spacing: 2px;
        }
        .header p {
            margin: 5px 0;
            font-size: 14px;
            color: #795548;
            opacity: 0.8;
        }

        /* 隨機封面區域 */
        .cover-area {
            height: 140px;
            background-color: #F0F4F0;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            color: var(--forest-green);
            margin-bottom: 15px;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
        }

        /* 目前播放 Track 顯示 */
        .current-track-display {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: var(--wood-brown);
            margin-bottom: 20px;
            min-height: 30px;
        }

        /* 搜尋框 */
        .search-container {
            margin-bottom: 15px;
            position: relative;
        }
        .search-container input {
            width: 100%;
            padding: 10px 15px 10px 35px;
            border-radius: 20px;
            border: 2px solid #D7CCC8;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
            background: white;
        }
        .search-container i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #A1887F;
        }

        /* 自訂進度條 */
        .progress-box {
            margin-bottom: 15px;
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 10px;
            background: #E0E0E0;
            outline: none;
            cursor: pointer;
        }
        /* 進度條拉桿小圓點 */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--forest-green);
            border: 2px solid white;
            cursor: pointer;
        }
        #progressBar {
            /* 天空藍填滿效果由 JS 控制 */
            background: linear-gradient(to right, var(--sky-blue) 0%, #E0E0E0 0%);
        }

        /* 控制按鈕區 */
        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--wood-brown);
            font-size: 24px;
            transition: transform 0.2s, color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .btn:hover {
            color: var(--forest-green);
            transform: scale(1.1);
        }
        .btn-play {
            font-size: 48px;
            color: var(--forest-green);
        }
        .mode-label {
            font-size: 10px;
            margin-top: 4px;
        }

        /* 音量控制 */
        .volume-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 10px;
            margin-bottom: 20px;
        }
        .volume-box i {
            color: var(--wood-brown);
            width: 20px;
            text-align: center;
        }

        /* 播放清單 */
        .playlist-wrapper {
            max-height: 180px;
            overflow-y: auto;
            border-top: 2px dashed #D7CCC8;
            padding-top: 10px;
        }
        .playlist-wrapper::-webkit-scrollbar {
            width: 5px;
        }
        .playlist-wrapper::-webkit-scrollbar-thumb {
            background: #D7CCC8;
            border-radius: 10px;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            color: var(--wood-brown);
            transition: 0.3s;
        }
        li:hover {
            background-color: #F0F0F0;
        }
        /* 播放中的高亮狀態 */
        li.active {
            background-color: var(--light-green);
            color: var(--forest-green);
            font-weight: bold;
        }
        li.active::before {
            content: '\f06c'; /* FontAwesome Leaf */
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <div class="player-window">
        <i class="fas fa-leaf deco-leaf"></i>
        
        <div class="header">
            <h1>傑克</h1>
            <p>MP3撥放器</p>
        </div>

        <div class="cover-area" id="coverIcon">
            <i class="fas fa-seedling"></i>
        </div>

        <div class="current-track-display" id="trackLabel">Track 01</div>

        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜尋編號或路徑...">
        </div>

        <div class="progress-box">
            <input type="range" id="progressBar" value="0" min="0" max="100" step="0.1">
        </div>

        <div class="controls">
            <button class="btn" id="shuffleBtn" title="隨機播放">
                <i class="fas fa-random"></i>
                <span class="mode-label" id="shuffleStatus">OFF</span>
            </button>
            <button class="btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
            <button class="btn btn-play" id="playBtn"><i class="fas fa-play-circle"></i></button>
            <button class="btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
            <button class="btn" id="repeatBtn" title="循環模式">
                <i class="fas fa-arrow-right" id="repeatIcon"></i>
                <span class="mode-label" id="repeatStatus">不循環</span>
            </button>
        </div>

        <div class="volume-box">
            <i class="fas fa-volume-off"></i>
            <input type="range" id="volumeBar" value="80" min="0" max="100">
            <i class="fas fa-volume-up"></i>
        </div>

        <div class="playlist-wrapper">
            <ul id="playlist">
                </ul>
        </div>
    </div>

    <audio id="mainAudio"></audio>

    <script>
        /* ================= 播放清單與顯示邏輯 ================= */
        // 音樂檔案路徑陣列 (請確保 music 資料夾存在)
        const musicFiles = [
            'music/song1.mp3',
            'music/song2.mp3',
            'music/song3.mp3',
        ];

        // 大自然系列圖示庫
        const icons = ['fa-seedling', 'fa-tree', 'fa-cloud', 'fa-sun', 'fa-mountain', 'fa-water', 'fa-leaf'];

        const audio = document.getElementById('mainAudio');
        const playlistEl = document.getElementById('playlist');
        const trackLabel = document.getElementById('trackLabel');
        const coverIcon = document.getElementById('coverIcon');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const volumeBar = document.getElementById('volumeBar');
        const searchInput = document.getElementById('searchInput');

        let currentIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 0; // 0: 不循環, 1: 全部循環, 2: 單曲循環

        // 初始化
        function init() {
            renderList();
            loadTrack(0, false);
        }

        // 格式化編號 (01, 02...)
        const formatIndex = (i) => String(i + 1).padStart(2, '0');

        // 渲染播放清單 (純編號顯示)
        function renderList() {
            playlistEl.innerHTML = '';
            musicFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.textContent = formatIndex(index);
                li.setAttribute('data-index', index);
                li.setAttribute('data-path', file); // 隱藏路徑用於搜尋
                li.onclick = () => loadTrack(index, true);
                playlistEl.appendChild(li);
            });
        }

        // 載入歌曲
        function loadTrack(index, autoPlay) {
            currentIndex = index;
            audio.src = musicFiles[index];
            trackLabel.textContent = `Track ${formatIndex(index)}`;
            
            // 隨機更換圖示
            const randomIcon = icons[Math.floor(Math.random() * icons.length)];
            coverIcon.innerHTML = `<i class="fas ${randomIcon}"></i>`;

            // 更新清單高亮
            const allItems = playlistEl.querySelectorAll('li');
            allItems.forEach(item => item.classList.remove('active'));
            if(allItems[index]) allItems[index].classList.add('active');

            if (autoPlay) playTrack();
        }

        // 播放控制
        function playTrack() {
            isPlaying = true;
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>';
        }

        function pauseTrack() {
            isPlaying = false;
            audio.pause();
            playBtn.innerHTML = '<i class="fas fa-play-circle"></i>';
        }

        playBtn.onclick = () => isPlaying ? pauseTrack() : playTrack();

        // 切換歌曲
        document.getElementById('nextBtn').onclick = () => {
            if(isShuffle) {
                let next;
                do { next = Math.floor(Math.random() * musicFiles.length); } 
                while (next === currentIndex && musicFiles.length > 1);
                loadTrack(next, true);
            } else {
                let next = (currentIndex + 1) % musicFiles.length;
                loadTrack(next, true);
            }
        };

        document.getElementById('prevBtn').onclick = () => {
            let prev = (currentIndex - 1 + musicFiles.length) % musicFiles.length;
            loadTrack(prev, true);
        };

        // 自動下一首邏輯
        audio.onended = () => {
            if (repeatMode === 2) { // 單曲
                loadTrack(currentIndex, true);
            } else if (repeatMode === 1 || currentIndex < musicFiles.length - 1 || isShuffle) {
                document.getElementById('nextBtn').click();
            } else {
                pauseTrack();
            }
        };

        // 進度條同步
        audio.ontimeupdate = () => {
            if (audio.duration) {
                const per = (audio.currentTime / audio.duration) * 100;
                progressBar.value = per;
                progressBar.style.background = `linear-gradient(to right, var(--sky-blue) ${per}%, #E0E0E0 ${per}%)`;
            }
        };

        progressBar.oninput = () => {
            audio.currentTime = (progressBar.value / 100) * audio.duration;
        };

        // 音量控制
        volumeBar.oninput = () => {
            audio.volume = volumeBar.value / 100;
        };

        // 搜尋功能 (比對編號或隱藏路徑)
        searchInput.oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const items = playlistEl.querySelectorAll('li');
            items.forEach(item => {
                const indexText = item.textContent.toLowerCase();
                const pathText = item.getAttribute('data-path').toLowerCase();
                item.style.display = (indexText.includes(val) || pathText.includes(val)) ? 'flex' : 'none';
            });
        };

        // 模式切換按鈕
        document.getElementById('shuffleBtn').onclick = () => {
            isShuffle = !isShuffle;
            document.getElementById('shuffleStatus').textContent = isShuffle ? 'ON' : 'OFF';
            document.getElementById('shuffleBtn').style.color = isShuffle ? 'var(--forest-green)' : 'var(--wood-brown)';
        };

        document.getElementById('repeatBtn').onclick = () => {
            repeatMode = (repeatMode + 1) % 3;
            const icon = document.getElementById('repeatIcon');
            const status = document.getElementById('repeatStatus');
            const btn = document.getElementById('repeatBtn');

            if(repeatMode === 0) {
                icon.className = 'fas fa-arrow-right';
                status.textContent = '不循環';
                btn.style.color = 'var(--wood-brown)';
            } else if(repeatMode === 1) {
                icon.className = 'fas fa-redo';
                status.textContent = '全循環';
                btn.style.color = 'var(--forest-green)';
            } else {
                icon.className = 'fas fa-sync-alt';
                status.textContent = '單循環';
                btn.style.color = 'var(--forest-green)';
            }
        };

        init();
    </script>
</body>
</html>
