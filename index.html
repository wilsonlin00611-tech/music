<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子為的歌曲</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================= 視覺風格 (UI/UX) ================= */
        :root {
            --bg-color: #F5EFE6;      /* 溫暖米色 */
            --wood-brown: #8B5A2B;    /* 木質棕 */
            --forest-green: #2E8B57;  /* 森林深綠 */
            --sky-blue: #87CEEB;      /* 天空藍 */
            --light-green: #E8F5E9;   /* 高亮背景 */
            --text-color: #3E2723; 
        }

        body {
            font-family: 'Kosugi Maru', sans-serif;
            background-color: var(--bg-color);
            background-image: url('data:image/svg+xml,%3Csvg width="20" height="20" xmlns="http://www.w3.org/2000/svg"%3E%3Ccircle cx="2" cy="2" r="1" fill="%23d7ccc8" opacity="0.3"/%3E%3C/svg%3E');
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        /* 木質窗框設計 */
        .player-window {
            background-color: #FAFAFA;
            width: 380px;
            border: 12px solid var(--wood-brown);
            border-radius: 45px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(139, 69, 19, 0.3);
            box-sizing: border-box;
            position: relative;
        }

        .deco-leaf {
            position: absolute;
            top: -20px;
            right: 30px;
            font-size: 30px;
            color: var(--forest-green);
            transform: rotate(20deg);
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        .header h1 {
            margin: 0;
            font-size: 32px;
            color: var(--forest-green);
        }
        .header p {
            margin: 5px 0;
            font-size: 14px;
            color: #795548;
        }

        /* 隨機封面區 */
        .cover-area {
            height: 140px;
            background-color: #F0F4F0;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            color: var(--forest-green);
            margin-bottom: 15px;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
        }

        .track-display {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: var(--wood-brown);
            margin-bottom: 20px;
            min-height: 30px;
        }

        /* 搜尋框 */
        .search-box {
            margin-bottom: 15px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 35px;
            border-radius: 20px;
            border: 2px solid #D7CCC8;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
        }
        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #A1887F;
        }

        /* 進度條 */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 10px;
            background: #E0E0E0;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--forest-green);
            border: 2px solid white;
        }
        #progressBar {
            background: linear-gradient(to right, var(--sky-blue) 0%, #E0E0E0 0%);
            margin-bottom: 15px;
        }

        /* 控制鈕 */
        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--wood-brown);
            font-size: 24px;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .btn:hover { color: var(--forest-green); transform: scale(1.1); }
        .btn-play { font-size: 48px; color: var(--forest-green); }
        .label { font-size: 10px; margin-top: 4px; }

        /* 音量 */
        .volume-box {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        /* 播放清單 */
        .playlist-box {
            max-height: 180px;
            overflow-y: auto;
            border-top: 2px dashed #D7CCC8;
            padding-top: 10px;
        }
        .playlist-box::-webkit-scrollbar { width: 5px; }
        .playlist-box::-webkit-scrollbar-thumb { background: #D7CCC8; border-radius: 10px; }
        
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            color: var(--wood-brown);
        }
        li.active {
            background-color: var(--light-green);
            color: var(--forest-green);
            font-weight: bold;
        }
        li.active::before {
            content: '\f06c';
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <div class="player-window">
        <i class="fas fa-leaf deco-leaf"></i>
        <div class="header">
            <h1>子為</h1>
            <p>MP3撥放器</p>
        </div>

        <div class="cover-area" id="coverIcon">
            <i class="fas fa-seedling"></i>
        </div>

        <div class="track-display" id="trackLabel">Track 01</div>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜尋編號或檔名...">
        </div>

        <input type="range" id="progressBar" value="0" min="0" max="100" step="0.1">

        <div class="controls">
            <button class="btn" id="shuffleBtn">
                <i class="fas fa-random"></i>
                <span class="label" id="shuffleTxt">OFF</span>
            </button>
            <button class="btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
            <button class="btn btn-play" id="playBtn"><i class="fas fa-play-circle"></i></button>
            <button class="btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
            <button class="btn" id="repeatBtn">
                <i class="fas fa-arrow-right" id="repeatIcon"></i>
                <span class="label" id="repeatTxt">不循環</span>
            </button>
        </div>

        <div class="volume-box">
            <i class="fas fa-volume-down"></i>
            <input type="range" id="volumeBar" value="80" min="0" max="100">
            <i class="fas fa-volume-up"></i>
        </div>

        <div class="playlist-box">
            <ul id="playlist"></ul>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        // 設定播放路徑
        const musicFiles = [
            'music/song1.mp3',
            'music/song2.mp3',
            'music/song3.mp3',
        ];

        const icons = ['fa-seedling', 'fa-tree', 'fa-cloud', 'fa-sun', 'fa-leaf', 'fa-mountain'];
        const audio = document.getElementById('audio');
        const playlistEl = document.getElementById('playlist');
        const trackLabel = document.getElementById('trackLabel');
        const coverIcon = document.getElementById('coverIcon');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const volumeBar = document.getElementById('volumeBar');
        const searchInput = document.getElementById('searchInput');

        let currentIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 0; // 0:不, 1:全, 2:單

        function init() {
            renderList();
            loadTrack(0, false);
        }

        function renderList() {
            playlistEl.innerHTML = '';
            musicFiles.forEach((file, index) => {
                const li = document.createElement('li');
                const num = String(index + 1).padStart(2, '0');
                li.textContent = num;
                li.dataset.index = index;
                li.dataset.path = file.toLowerCase();
                li.onclick = () => loadTrack(index, true);
                playlistEl.appendChild(li);
            });
        }

        function loadTrack(index, auto) {
            currentIndex = index;
            audio.src = musicFiles[index];
            trackLabel.textContent = `Track ${String(index + 1).padStart(2, '0')}`;
            coverIcon.innerHTML = `<i class="fas ${icons[Math.floor(Math.random()*icons.length)]}"></i>`;
            
            const items = playlistEl.querySelectorAll('li');
            items.forEach(item => item.classList.remove('active'));
            if(items[index]) items[index].classList.add('active');
            
            if(auto) playTrack();
        }

        function playTrack() { isPlaying = true; audio.play(); playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>'; }
        function pauseTrack() { isPlaying = false; audio.pause(); playBtn.innerHTML = '<i class="fas fa-play-circle"></i>'; }

        playBtn.onclick = () => isPlaying ? pauseTrack() : playTrack();

        document.getElementById('nextBtn').onclick = () => {
            let next = isShuffle ? Math.floor(Math.random()*musicFiles.length) : (currentIndex + 1) % musicFiles.length;
            loadTrack(next, true);
        };

        document.getElementById('prevBtn').onclick = () => {
            let prev = (currentIndex - 1 + musicFiles.length) % musicFiles.length;
            loadTrack(prev, true);
        };

        audio.onended = () => {
            if(repeatMode === 2) loadTrack(currentIndex, true);
            else if(repeatMode === 1 || currentIndex < musicFiles.length - 1 || isShuffle) document.getElementById('nextBtn').click();
            else pauseTrack();
        };

        audio.ontimeupdate = () => {
            if(audio.duration){
                const per = (audio.currentTime / audio.duration) * 100;
                progressBar.value = per;
                progressBar.style.background = `linear-gradient(to right, var(--sky-blue) ${per}%, #E0E0E0 ${per}%)`;
            }
        };

        progressBar.oninput = () => audio.currentTime = (progressBar.value / 100) * audio.duration;
        volumeBar.oninput = () => audio.volume = volumeBar.value / 100;

        searchInput.oninput = (e) => {
            const val = e.target.value.toLowerCase();
            playlistEl.querySelectorAll('li').forEach(li => {
                li.style.display = (li.textContent.includes(val) || li.dataset.path.includes(val)) ? 'flex' : 'none';
            });
        };

        document.getElementById('shuffleBtn').onclick = () => {
            isShuffle = !isShuffle;
            document.getElementById('shuffleTxt').textContent = isShuffle ? 'ON' : 'OFF';
            document.getElementById('shuffleBtn').style.color = isShuffle ? 'var(--forest-green)' : 'var(--wood-brown)';
        };

        document.getElementById('repeatBtn').onclick = () => {
            repeatMode = (repeatMode + 1) % 3;
            const icon = document.getElementById('repeatIcon');
            const txt = document.getElementById('repeatTxt');
            if(repeatMode === 0) { icon.className = 'fas fa-arrow-right'; txt.textContent = '不循環'; }
            else if(repeatMode === 1) { icon.className = 'fas fa-redo'; txt.textContent = '全循環'; }
            else { icon.className = 'fas fa-sync-alt'; txt.textContent = '單循環'; }
        };

        init();
    </script>
</body>
</html>
